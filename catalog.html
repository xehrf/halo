<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Halo</title>
  <meta name="description" content="Каталог Halo: фильтры по цене, материалу, размеру и категориям.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" style="min-height:auto;">
    <nav class="nav">
      <a href="index.html" class="logo">Halo</a>
      <ul class="nav-links">
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="account.html">Кабинет</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>
  </header>

  <h1 class="page-title">Каталог Halo</h1>

  <section class="catalog-section">
    <form id="catalogFilters" class="halo-filter-grid">
      <label>
        Поиск
        <input type="text" name="search" placeholder="Название или описание">
      </label>
      <label>
        Категория
        <select name="category">
          <option value="">Все</option>
          <option value="koltsa">Кольца</option>
          <option value="braslety">Браслеты</option>
          <option value="tsepochki">Цепочки</option>
          <option value="sergi">Серьги</option>
        </select>
      </label>
      <label>
        Материал
        <input type="text" name="material" placeholder="Золото, серебро...">
      </label>
      <label>
        Размер
        <input type="text" name="size" placeholder="16, 17.5, M...">
      </label>
      <label>
        Цена от
        <input type="number" name="minPrice" min="0" step="1">
      </label>
      <label>
        Цена до
        <input type="number" name="maxPrice" min="0" step="1">
      </label>
      <label>
        Сортировка
        <select name="sort">
          <option value="newest">Сначала новые</option>
          <option value="price_asc">Цена по возрастанию</option>
          <option value="price_desc">Цена по убыванию</option>
          <option value="rating_desc">По рейтингу</option>
        </select>
      </label>
      <div class="halo-filter-actions">
        <button type="submit" class="btn btn-dark">Применить</button>
        <button type="button" class="btn btn-dark" id="filtersReset">Сбросить</button>
      </div>
    </form>

    <p class="halo-help-text">Виды товаров: обручальные кольца, кольца с камнем, жесткие и цепные браслеты, якорные и панцирные цепочки, пусеты и подвесные серьги.</p>

    <div id="catalogMessage" class="halo-message" role="status" aria-live="polite"></div>
    <div id="catalogList" class="products-grid catalog-grid"></div>
  </section>

  <footer class="footer">
    <p>© Halo, 2026. Все права защищены.</p>
    <p>
      <a href="delivery.html">Доставка</a> ·
      <a href="returns.html">Возврат</a> ·
      <a href="about.html">О магазине</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
